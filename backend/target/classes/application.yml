spring:
  datasource:
    url: jdbc:mysql://localhost:3306/omnischool?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${EMAIL_USERNAME}
    password: ${EMAIL_PASSWORD}
    properties.mail.smtp:
      auth: true
      starttls.enable: true

jwt:
  secret: ${JWT_SECRET:omnischool-secret-2024}
  expiration: 86400000
  refresh-expiration: 604800000

app:
  cors:
    allowed-origins: http://localhost:5173,https://omnischool.tn

server:
  port: 8080
